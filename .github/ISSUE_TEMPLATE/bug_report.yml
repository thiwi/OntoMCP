name: Bug Report
description: Report a reproducible defect
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps and ontology/tool inputs to reproduce.
      placeholder: |
        1. Run ...
        2. Call tool ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What did you expect instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Commit
      placeholder: e.g. v1.0.0 or commit SHA
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Node.js, npm, OS
    validations:
      required: true
