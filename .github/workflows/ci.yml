name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Ontology lint (clean fixture, must pass)
        run: node dist/cli.js lint ./test/lint-fixtures/clean --fail-on-warnings

      - name: Ontology lint (example warning path, expected fail)
        run: |
          if node dist/cli.js lint ./examples/ontologies/retail-banking --fail-on-warnings; then
            echo "Expected lint to fail for retail-banking, but it passed."
            exit 1
          else
            echo "Expected lint failure observed for retail-banking."
          fi

      - name: Unit tests
        run: npm test

      - name: Coverage
        run: npm run test:coverage
